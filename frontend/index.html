<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->

    <meta name="description" content="Shop curated electronics, fashion, and home goods on Lumière — a modern full-stack store with search, cart, secure checkout, order tracking, and reviews." />

    <meta name="author" content="Amar Hassen Mohammednur" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#111827" />

    <link rel="icon" href="/favicon.ico" sizes="32x32" />

    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lumière" />
    <meta property="og:title" content="Lumière — Modern MERN E-Commerce Store" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://lumiere-ecommerce.vercel.app/og-image.png" />

    <!-- Structured data -->

    {
      "@context": "https://schema.org",
      "@type": "OnlineStore",
      "name": "Lumière",
      "url": "https://lumiere-ecommerce.vercel.app/",
      "description": "A modern full-stack MERN e-commerce store.",
      "author": { "@type": "Person", "name": "Amar Hassen Mohammednur" }
    }

  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
